name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install peewee pytest
      - run: python -m pytest tests/test_formatters.py tests/test_services.py tests/test_full.py -v